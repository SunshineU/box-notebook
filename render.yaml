services:
  - type: web
    name: storage-box
    env: python
    region: singapore
    plan: free
    buildCommand: |
      # 安装 Python 依赖
      pip install -r requirements.txt
      # 构建前端
      cd frontend
      npm install
      npm run build
    startCommand: uvicorn src.storage_box.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
